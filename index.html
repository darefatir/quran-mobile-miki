<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Qur'an 30 Juz - M Faathir</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        quran: ['"Amiri Quran"', 'serif'],
                    },
                    colors: {
                        kertas: '#fdfaf6',
                    }
                }
            }
        }
    </script>
    
    <style>
        .quran-text {
            text-align: justify;
            text-align-last: center;
            direction: rtl;
        }
        
        #toast {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.5s, visibility 0.5s;
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-200 text-slate-800 font-sans antialiased flex flex-col items-center min-h-screen relative">

    <header class="sticky top-0 w-full bg-emerald-800 text-white shadow-lg z-50">
        <div class="max-w-2xl mx-auto px-4 py-3 flex flex-col gap-3">
            
            <div class="flex justify-between items-center border-b border-emerald-700/50 pb-2">
                <div class="font-bold text-lg flex items-center gap-2">
                    📖 Al-Qur'an Mobile
                </div>
                <div class="text-xs text-emerald-200 font-medium">
                    Created by: M Faathir / Kakak Mingky
                </div>
            </div>
            
            <div class="flex flex-wrap w-full gap-2 text-sm text-slate-900">
                <select id="juz-select" class="flex-1 min-w-[80px] p-2 rounded bg-white border border-emerald-600 outline-none cursor-pointer font-medium">
                    </select>

                <select id="surah-select" class="flex-auto min-w-[130px] p-2 rounded bg-white border border-emerald-600 outline-none cursor-pointer font-medium disabled:bg-slate-100 disabled:text-slate-400">
                    <option value="">-- Surah --</option>
                </select>
                
                <select id="page-select" class="flex-1 min-w-[100px] p-2 rounded bg-white border border-emerald-600 outline-none cursor-pointer font-medium disabled:bg-slate-100 disabled:text-slate-400">
                    <option value="">-- Halaman --</option>
                </select>
            </div>
        </div>
    </header>

    <div id="toast" class="fixed bottom-5 bg-emerald-900 text-white px-4 py-2 rounded-full shadow-lg z-50 text-sm font-medium">
        Memuat data...
    </div>

    <div id="loading" class="mt-12 text-slate-500 font-medium animate-pulse flex flex-col items-center gap-2">
        <svg class="animate-spin h-8 w-8 text-emerald-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Memuat ayat Al-Qur'an...</span>
    </div>
    
    <main id="quran-container" class="w-full max-w-2xl px-4 py-6 box-border hidden"></main>

    <script>
        // DOM Elements
        const container = document.getElementById('quran-container');
        const loading = document.getElementById('loading');
        const juzSelect = document.getElementById('juz-select');
        const surahSelect = document.getElementById('surah-select');
        const pageSelect = document.getElementById('page-select');

        // State Global
        let currentActiveJuz = 30; // Default awal jika tidak ada memori
        let pageObserver = null;

        function toArabicNumber(num) {
            return num.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
        }

        function scrollToTarget(id) {
            const element = document.getElementById(id);
            if (element) {
                // Offset ditingkatkan karena header sekarang lebih tinggi (2 baris)
                const headerOffset = 110; 
                const elementPosition = element.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
  
                window.scrollTo({
                    top: offsetPosition,
                    behavior: "smooth"
                });
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Setup Opsi Juz 1-30
        function initJuzDropdown() {
            for (let i = 1; i <= 30; i++) {
                juzSelect.innerHTML += `<option value="${i}">Juz ${i}</option>`;
            }
        }

        // Fungsi utama fetch data per Juz
        async function fetchJuz(juzNumber, isInitialLoad = false) {
            // UI state: Tampilkan loading, sembunyikan container, disable dropdown
            loading.style.display = 'flex';
            container.style.display = 'none';
            container.innerHTML = '';
            surahSelect.innerHTML = '<option value="">-- Surah --</option>';
            pageSelect.innerHTML = '<option value="">-- Halaman --</option>';
            surahSelect.disabled = true;
            pageSelect.disabled = true;

            try {
                const response = await fetch(`https://api.alquran.cloud/v1/juz/${juzNumber}/quran-uthmani`);
                const data = await response.json();
                const ayahs = data.data.ayahs;
                
                let currentPageNumber = null;
                let currentSurahNumber = null;
                let htmlContent = '';
                
                let uniquePages = new Set();
                let uniqueSurahs = new Map(); 

                ayahs.forEach(ayah => {
                    uniquePages.add(ayah.page);
                    if (!uniqueSurahs.has(ayah.surah.number)) {
                        uniqueSurahs.set(ayah.surah.number, ayah.surah.englishName);
                    }

                    if (ayah.page !== currentPageNumber) {
                        if (currentPageNumber !== null) {
                            htmlContent += `</div></div>`; 
                        }
                        
                        htmlContent += `
                            <div class="quran-page-card bg-kertas mb-8 rounded-xl shadow-md border border-slate-300 overflow-hidden" id="page-${ayah.page}">
                                <div class="bg-emerald-50 text-emerald-800 text-center font-bold py-2 border-b border-slate-200 text-sm tracking-wide flex justify-between px-4">
                                    <span>Juz ${juzNumber}</span>
                                    <span>Halaman ${ayah.page}</span>
                                </div>
                                <div class="p-5 font-quran text-[2.2rem] leading-[2.6] quran-text text-slate-900">`;
                        
                        currentPageNumber = ayah.page;
                    }

                    if (ayah.surah.number !== currentSurahNumber) {
                        htmlContent += `
                            <div id="surah-${ayah.surah.number}" class="text-center text-2xl text-emerald-700 border-2 border-emerald-700 py-2 mx-0 my-5 rounded-lg bg-emerald-50/50">
                                سورة ${ayah.surah.name.replace('سُورَةُ ', '')}
                            </div>`;
                        
                        if (ayah.surah.number !== 1 && ayah.surah.number !== 9) {
                            htmlContent += `<span class="block text-center text-3xl mb-5">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</span>`;
                        }
                        currentSurahNumber = ayah.surah.number;
                    }

                    let text = ayah.text;
                    if (ayah.numberInSurah === 1 && ayah.surah.number !== 1) {
                        text = text.replace('بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ ', '');
                    }

                    htmlContent += `<span class="inline">${text} <span class="text-2xl text-emerald-600 mx-1">۝${toArabicNumber(ayah.numberInSurah)}</span> </span>`;
                });

                htmlContent += `</div></div>`; 
                
                // Masukkan ke DOM
                container.innerHTML = htmlContent;
                loading.style.display = 'none';
                container.style.display = 'block';

                // Isi ulang dropdown Surah & Halaman
                uniqueSurahs.forEach((latinName, number) => {
                    surahSelect.innerHTML += `<option value="surah-${number}">${number}. ${latinName}</option>`;
                });

                uniquePages.forEach(page => {
                    pageSelect.innerHTML += `<option value="page-${page}">Halaman ${page}</option>`;
                });

                // Enable dropdowns
                surahSelect.disabled = false;
                pageSelect.disabled = false;
                juzSelect.value = juzNumber; // Pastikan nilai dropdown Juz sesuai

                // === Setup Intersection Observer untuk Auto Save ===
                if (pageObserver) {
                    pageObserver.disconnect(); // Reset observer lama
                }

                const observerOptions = {
                    root: null,
                    rootMargin: '0px',
                    threshold: 0.3
                };

                pageObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            // Simpan Juz dan ID Halaman ke Local Storage
                            localStorage.setItem('lastReadJuz', juzNumber);
                            localStorage.setItem('lastReadPageID', entry.target.id);
                            
                            // Sinkronisasi dropdown halaman
                            const pageNumberMatch = entry.target.id.match(/\d+/);
                            if (pageNumberMatch) {
                                pageSelect.value = entry.target.id;
                            }
                        }
                    });
                }, observerOptions);

                document.querySelectorAll('.quran-page-card').forEach(card => {
                    pageObserver.observe(card);
                });

                // === Logika Jump ke Last Read saat Initial Load ===
                if (isInitialLoad) {
                    const savedPageID = localStorage.getItem('lastReadPageID');
                    if (savedPageID && document.getElementById(savedPageID)) {
                        setTimeout(() => {
                            scrollToTarget(savedPageID);
                            pageSelect.value = savedPageID;
                            const pageNum = savedPageID.replace('page-', '');
                            showToast(`Melanjutkan dari Juz ${juzNumber}, Hal ${pageNum}`);
                        }, 500);
                    } else {
                        showToast(`Memuat Juz ${juzNumber} berhasil`);
                    }
                } else {
                    // Jika pindah Juz manual, lompat ke halaman pertama dari juz tersebut
                    window.scrollTo({ top: 0, behavior: "smooth" });
                    showToast(`Juz ${juzNumber} berhasil dimuat`);
                }

            } catch (error) {
                loading.innerHTML = `<span class="text-red-500">Gagal memuat data. Periksa koneksi internet Anda.</span>`;
                console.error(error);
            }
        }

        // === Inisialisasi Aplikasi ===
        function initApp() {
            initJuzDropdown();

            // Cek apakah ada data Juz terakhir di memori
            const savedJuz = localStorage.getItem('lastReadJuz');
            if (savedJuz) {
                currentActiveJuz = parseInt(savedJuz);
            }

            // Muat Juz
            fetchJuz(currentActiveJuz, true);

            // Event Listeners Navigasi
            juzSelect.addEventListener('change', (e) => {
                const selectedJuz = e.target.value;
                if (selectedJuz != currentActiveJuz) {
                    currentActiveJuz = selectedJuz;
                    fetchJuz(currentActiveJuz, false);
                }
            });

            surahSelect.addEventListener('change', (e) => {
                if (e.target.value) scrollToTarget(e.target.value);
                pageSelect.selectedIndex = 0; 
            });

            pageSelect.addEventListener('change', (e) => {
                if (e.target.value) scrollToTarget(e.target.value);
                surahSelect.selectedIndex = 0;
            });
        }

        // Jalankan saat web dimuat
        initApp();
    </script>
</body>
</html>
